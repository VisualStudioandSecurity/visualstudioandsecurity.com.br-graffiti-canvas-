<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Crush</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Fredoka', sans-serif; }

    .cell {
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      position: relative;
    }
    .cell:hover { transform: scale(1.12); z-index: 2; }
    .cell.pop {
      animation: pop 0.3s ease-out forwards;
    }
    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes fall {
      from { transform: translateY(-60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .cell.fall { animation: fall 0.25s ease-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.3s; }
    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
    }
    .score-float {
      position: fixed; pointer-events: none; font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5); z-index: 100;
      animation: scoreFloat 0.8s ease-out forwards;
    }
    .combo-text {
      animation: comboFlash 0.5s ease-out;
    }
    @keyframes comboFlash {
      0% { transform: scale(2); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .pulse { animation: pulse 0.4s; }
    .grid-bg {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }
    .glow { box-shadow: 0 0 20px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.2); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="grid-bg h-full">
  <div id="app" class="h-full flex flex-col items-center justify-center p-3 overflow-auto w-full"><!-- Header -->
   <div class="w-full max-w-md mb-3">
    <h1 id="title" class="text-3xl font-bold text-white text-center mb-2 drop-shadow-lg">🎯 Color Crush</h1>
    <p class="text-center text-sm text-purple-200 mb-3">Elimine grupos de 3+ blocos coloridos!</p>
    <div class="flex justify-between items-center bg-white/10 backdrop-blur rounded-xl px-4 py-2 glow">
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">
       Pontos
      </div>
      <div id="score" class="text-2xl font-bold text-white">
       0
      </div>
     </div>
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">
       Combo
      </div>
      <div id="combo" class="text-2xl font-bold text-yellow-300">
       x1
      </div>
     </div>
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">
       Recorde
      </div>
      <div id="best" class="text-2xl font-bold text-emerald-300">
       0
      </div>
     </div>
     <div class="text-center">
      <div class="text-xs text-purple-300 uppercase tracking-wider">
       Jogadas
      </div>
      <div id="moves" class="text-2xl font-bold text-rose-300">
       30
      </div>
     </div>
    </div>
   </div><!-- Grid -->
   <div id="grid" class="grid gap-1 w-full max-w-md bg-white/5 rounded-2xl p-2 glow" style="aspect-ratio:1;"></div><!-- Game Over Overlay -->
   <div id="gameover" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-gradient-to-br from-purple-900 to-indigo-900 rounded-3xl p-8 text-center max-w-xs w-full mx-4 glow">
     <div class="text-5xl mb-3">
      🏆
     </div>
     <h2 class="text-2xl font-bold text-white mb-1">Fim de Jogo!</h2>
     <p class="text-purple-300 mb-4">Sua pontuação:</p>
     <div id="finalScore" class="text-5xl font-bold text-yellow-300 mb-4">
      0
     </div>
     <p id="newRecord" class="text-emerald-400 font-bold mb-4 hidden">🎉 Novo Recorde!</p><button id="restartBtn" class="bg-gradient-to-r from-pink-500 to-purple-500 text-white font-bold py-3 px-8 rounded-xl text-lg hover:scale-105 transition-transform active:scale-95"> Jogar Novamente </button>
    </div>
   </div>
  </div>
  <script>
    const COLS = 8, ROWS = 8, TOTAL_MOVES = 30;
    const COLORS = ['#ff006e','#00f5ff','#39ff14','#ffbe0b','#8a2be2','#ff10f0'];
    const MIN_GROUP = 3;

    let grid = [], score = 0, combo = 1, moves = TOTAL_MOVES, best = 0, locked = false;

    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const bestEl = document.getElementById('best');
    const movesEl = document.getElementById('moves');
    const gameoverEl = document.getElementById('gameover');
    const finalScoreEl = document.getElementById('finalScore');
    const newRecordEl = document.getElementById('newRecord');
    const restartBtn = document.getElementById('restartBtn');

    gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

    function randColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

    function init() {
      grid = []; score = 0; combo = 1; moves = TOTAL_MOVES; locked = false;
      gridEl.innerHTML = '';
      gameoverEl.classList.add('hidden');
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          const color = randColor();
          grid[r][c] = color;
          const cell = createCell(r, c, color);
          gridEl.appendChild(cell);
        }
      }
      updateUI();
    }

    function createCell(r, c, color) {
      const cell = document.createElement('div');
      cell.className = 'cell fall';
      cell.style.background = `linear-gradient(135deg, ${color}, ${color}dd)`;
      cell.style.boxShadow = `0 3px 12px ${color}66, inset 0 1px 0 rgba(255,255,255,0.3)`;
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => handleClick(+cell.dataset.r, +cell.dataset.c));
      return cell;
    }

    function getCell(r, c) {
      return gridEl.children[r * COLS + c];
    }

    function findGroup(r, c) {
      const color = grid[r][c];
      if (!color) return [];
      const visited = new Set();
      const stack = [[r, c]];
      const group = [];
      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = `${cr},${cc}`;
        if (visited.has(key)) continue;
        if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) continue;
        if (grid[cr][cc] !== color) continue;
        visited.add(key);
        group.push([cr, cc]);
        stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
      }
      return group;
    }

    function handleClick(r, c) {
      if (locked || !grid[r][c]) return;
      const group = findGroup(r, c);
      if (group.length < MIN_GROUP) {
        getCell(r, c).classList.add('shake');
        setTimeout(() => getCell(r, c).classList.remove('shake'), 300);
        return;
      }

      locked = true;
      moves--;

      // Score: bigger groups = way more points
      const pts = group.length * group.length * combo * 10;
      score += pts;
      combo = Math.min(combo + 1, 10);

      // Float score
      const cell = getCell(r, c);
      const rect = cell.getBoundingClientRect();
      const floater = document.createElement('div');
      floater.className = 'score-float';
      floater.textContent = `+${pts}`;
      floater.style.left = rect.left + rect.width/2 - 20 + 'px';
      floater.style.top = rect.top + 'px';
      floater.style.fontSize = Math.min(16 + group.length * 2, 36) + 'px';
      document.body.appendChild(floater);
      setTimeout(() => floater.remove(), 800);

      // Pop animation
      group.forEach(([gr, gc]) => {
        const el = getCell(gr, gc);
        el.classList.add('pop');
        grid[gr][gc] = null;
      });

      updateUI();

      setTimeout(() => {
        applyGravity();
        fillEmpty();
        rebuildDOM();
        locked = false;
        if (moves <= 0) endGame();
        else if (!hasValidMoves()) { shuffleBoard(); }
      }, 350);
    }

    function applyGravity() {
      for (let c = 0; c < COLS; c++) {
        let write = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (grid[r][c]) {
            grid[write][c] = grid[r][c];
            if (write !== r) grid[r][c] = null;
            write--;
          }
        }
        for (let r = write; r >= 0; r--) grid[r][c] = null;
      }
    }

    function fillEmpty() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!grid[r][c]) grid[r][c] = randColor();
    }

    function rebuildDOM() {
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          gridEl.appendChild(createCell(r, c, grid[r][c]));
    }

    function hasValidMoves() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (findGroup(r, c).length >= MIN_GROUP) return true;
      return false;
    }

    function shuffleBoard() {
      const colors = grid.flat();
      for (let i = colors.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [colors[i], colors[j]] = [colors[j], colors[i]];
      }
      let idx = 0;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          grid[r][c] = colors[idx++];
      if (!hasValidMoves()) {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            grid[r][c] = randColor();
      }
      rebuildDOM();
      combo = 1;
      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = score;
      scoreEl.parentElement.classList.add('pulse');
      setTimeout(() => scoreEl.parentElement.classList.remove('pulse'), 400);
      comboEl.textContent = `x${combo}`;
      if (combo > 1) { comboEl.classList.add('combo-text'); setTimeout(() => comboEl.classList.remove('combo-text'), 500); }
      bestEl.textContent = best;
      movesEl.textContent = moves;
      if (moves <= 5) movesEl.style.color = '#f87171';
    }

    function endGame() {
      const isRecord = score > best;
      if (isRecord) best = score;
      finalScoreEl.textContent = score;
      newRecordEl.classList.toggle('hidden', !isRecord);
      bestEl.textContent = best;
      gameoverEl.classList.remove('hidden');
    }

    restartBtn.addEventListener('click', init);

    // Element SDK
    const defaultConfig = {
      game_title: '🎯 Color Crush',
      background_color: '#0f0c29',
      surface_color: '#ffffff1a',
      text_color: '#ffffff',
      primary_action: '#a855f7',
      secondary_action: '#ec4899'
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const t = config.game_title || defaultConfig.game_title;
        document.getElementById('title').textContent = t;
        document.body.style.background = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color}, ${config.primary_action || defaultConfig.primary_action}44, ${config.background_color || defaultConfig.background_color})`;
        document.querySelectorAll('.glow').forEach(el => {
          el.style.backgroundColor = config.surface_color || defaultConfig.surface_color;
        });
        document.getElementById('title').style.color = config.text_color || defaultConfig.text_color;
        restartBtn.style.background = `linear-gradient(to right, ${config.secondary_action || defaultConfig.secondary_action}, ${config.primary_action || defaultConfig.primary_action})`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color: v}); }},
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color: v}); }},
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color: v}); }},
          { get: () => config.primary_action || defaultConfig.primary_action, set: v => { config.primary_action = v; window.elementSdk.setConfig({primary_action: v}); }},
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: v => { config.secondary_action = v; window.elementSdk.setConfig({secondary_action: v}); }}
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || 'Fredoka',
          set: v => { config.font_family = v; window.elementSdk.setConfig({font_family: v}); }
        },
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['game_title', config.game_title || defaultConfig.game_title]
      ])
    });

    init();
    lucide.createIcons();
  </script>
