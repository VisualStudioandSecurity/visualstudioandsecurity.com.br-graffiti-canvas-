<!doctype html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Graffiti | Secured Portal</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background-color: #050505; }
    :root {
      --bg-color: #050505;
      --surface-color: #111111;
      --neon: #00f3ff;
    }
    canvas { touch-action: none; cursor: none; background: #0a0a0a; }
    .ui-overlay { pointer-events: none; }
    .ui-overlay > * { pointer-events: auto; }
    
    /* Cursor de Spray Customizado */
    #spray-follower {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 60px;
        height: 60px;
        margin-left: -30px;
        margin-top: -30px;
        transition: transform 0.05s linear;
    }
  </style>
</head>
<body class="text-white h-full flex flex-col">

  <div id="spray-follower">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" stroke="#00f3ff" stroke-width="2" fill="none" opacity="0.5" class="can-color-stroke"/>
      <circle cx="50" cy="50" r="5" fill="#00f3ff" class="can-color-fill"/>
    </svg>
  </div>

  <div class="fixed top-4 left-4 z-50 flex gap-4 ui-overlay bg-black/50 p-3 rounded-xl border border-white/10">
    <input type="color" id="color-picker" value="#00f3ff" class="w-10 h-10 rounded-lg border-none bg-transparent cursor-pointer">
    <div class="flex flex-col justify-center">
        <span class="text-[10px] text-gray-400 font-mono">COLOR_SELECTION</span>
    </div>
  </div>

  <canvas id="graffiti-canvas"></canvas>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Inicializar Ícones
      lucide.createIcons();

      const canvas = document.getElementById('graffiti-canvas');
      const ctx = canvas.getContext('2d');
      const colorPicker = document.getElementById('color-picker');
      const follower = document.getElementById('spray-follower');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Redesenhar fundo escuro após resize
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      window.addEventListener('resize', resize);
      resize();

      let painting = false;

      // Seguir o mouse/touch
      const move = (e) => {
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        follower.style.left = x + 'px';
        follower.style.top = y + 'px';

        if (painting) spray(x, y);
      };

      // Lógica de Spray Neon
      function spray(x, y) {
        const radius = 20;
        const density = 40;
        ctx.fillStyle = colorPicker.value;
        
        for (let i = 0; i < density; i++) {
          const offsetX = (Math.random() - 0.5) * 2 * radius;
          const offsetY = (Math.random() - 0.5) * 2 * radius;
          if (Math.sqrt(offsetX*offsetX + offsetY*offsetY) < radius) {
            ctx.globalAlpha = Math.random() * 0.5;
            ctx.fillRect(x + offsetX, y + offsetY, 2, 2);
          }
        }
      }

      // Eventos de Input
      window.addEventListener('mousedown', () => painting = true);
      window.addEventListener('mouseup', () => painting = false);
      window.addEventListener('mousemove', move);
      
      window.addEventListener('touchstart', (e) => { painting = true; move(e); });
      window.addEventListener('touchend', () => painting = false);
      window.addEventListener('touchmove', move);

      // Atualizar cor do cursor
      colorPicker.addEventListener('input', () => {
        const c = colorPicker.value;
        document.querySelector('.can-color-fill').setAttribute('fill', c);
        document.querySelector('.can-color-stroke').setAttribute('stroke', c);
      });

      // Bloqueio de Segurança Senior
      document.addEventListener('contextmenu', e => e.preventDefault());
    });
  </script>
</body>
</html>
