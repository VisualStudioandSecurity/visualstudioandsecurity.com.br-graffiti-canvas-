<!DOCTYPE html>
<html>
<head>
    <title>Gravity Fall - VS Games</title>
    <style>
        body { background: #1a1a1a; color: #bd93f9; text-align: center; }
        canvas { background: #282a36; border: 2px solid #bd93f9; }
    </style>
</head>
<body>
    <h1>GRAVITY FALL</h1>
    <canvas id="gf" width="300" height="450"></canvas>
    <script>
        const canvas = document.getElementById("gf"), ctx = canvas.getContext("2d");
        let px = 140;
        function draw() {
            ctx.clearRect(0,0,300,450);
            ctx.fillStyle = "#ff79c6"; ctx.fillRect(px, 100, 25, 25); 
            ctx.fillStyle = "#44475a"; ctx.fillRect(0, 400, 300, 50); 
            requestAnimationFrame(draw);
        }
        document.onkeydown = (e) => {
            if(e.key === "ArrowLeft" && px > 0) px -= 15;
            if(e.key === "ArrowRight" && px < 275) px += 15;
        };
        draw();
    </script>
</body>
</html>
