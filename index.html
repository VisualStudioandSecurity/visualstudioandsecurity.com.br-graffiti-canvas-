    <style>
        :root { 
            --bg: #050505; --card: #0d1117; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; --neon: #00f2ff; --red: #ff0055;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: white;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            text-align: center; min-height: 100vh;
            user-select: none; -webkit-user-select: none;
            overflow-x: hidden;
        }

        #matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.1; pointer-events: none;
        }

        .container { width: 92%; max-width: 1200px; margin: 50px auto; z-index: 1; }

        h1 {
            font-size: 2.8rem; text-transform: uppercase; letter-spacing: 4px;
            text-shadow: 0 0 20px var(--neon); color: white; margin-bottom: 0;
        }

        .badge-security {
            font-family: monospace; font-size: 0.8rem; color: var(--neon);
            border: 1px solid var(--neon); padding: 4px 12px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .section-title { 
            color: var(--neon); font-size: 1rem; margin: 60px 0 30px; 
            text-transform: uppercase; border-bottom: 1px solid #30363d; 
            display: inline-block; padding-bottom: 8px; letter-spacing: 2px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; width: 100%;
        }

        .game-link { text-decoration: none; color: inherit; display: block; }
        
        .game-card {
            background: var(--card); border-radius: 16px; border: 1px solid #30363d;
            overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative;
        }

        .game-link:hover .game-card { 
            transform: translateY(-10px); 
            border-color: var(--neon); 
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }

        .game-card img { width: 100%; height: 180px; object-fit: cover; background: #000; transition: 0.5s; }
        .game-link:hover img { transform: scale(1.05); }

        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px; color: var(--neon); font-size: 1.2rem; }
        .card-content p { color: var(--gray); font-size: 0.9rem; line-height: 1.5; }

        .status-tag { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        .btn-group { margin: 40px 0; display: flex; justify-content: center; gap: 15px; }
        .btn {
            padding: 14px 28px; border-radius: 8px; font-weight: bold;
            text-decoration: none; color: white; border: none; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .btn-github { background: #24292f; border: 1px solid #30363d; }
        .btn-github:hover { background: #30363d; border-color: var(--neon); }
        .btn-pix { background: var(--neon); color: #050505; }
        .btn-pix:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon); }

        footer { width: 100%; padding: 40px 0; border-top: 1px solid #30363d; background: #050505; margin-top: auto; }
        .apache-footer { font-size: 12px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="container">
        <div class="badge-security">Security Protocol: Active</div>
        <h1>Visual Studio Games</h1>
        <p style="color: var(--gray); font-weight: bold; letter-spacing: 1px;">SENIOR DEVELOPER • CYBERSECURITY SPECIALIST</p>

        <div class="btn-group">
            <a href="https://github.com/VisualStudioAndSecurity" class="btn btn-github" target="_blank">
                <span>View GitHub</span>
            </a>
            <button onclick="copyPix()" class="btn btn-pix">Apoiar Projeto (PIX)</button>
        </div>

        <div class="section-title">0x01_Projetos_Ativos</div>
        
        <div class="gallery">
            <a href="graffiti-canvas/" class="game-link">
                <div class="game-card">
                    <img src="https://images2.imgbox.com/6a/e2/mR1fR1Lz_o.png" alt="Graffiti Canvas">
                    <div class="card-content">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3>Visual Graffiti</h3>
                            <span class="status-tag" style="background: var(--red);">LIVE</span>
                        </div>
                        <p>Simulador de graffiti profissional com marca d'água dinâmica e proteção de autoria.</p>
