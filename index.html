    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; 
            --neon: #00f2ff; /* Ciano Neon (cite: image_7.png) */
        }

        /* Centralização Total Modern */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 50px 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 900px; margin: auto; }

        /* --- O LETREIRO NEON (cite: image_7.png) --- */
        h1 {
            font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
            margin-bottom: 10px;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--neon), 0 0 30px var(--neon); color: #fff; }
            to { text-shadow: 0 0 5px #fff, 0 0 15px var(--accent), 0 0 25px var(--accent); color: var(--neon); }
        }

        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 30px; }
        
        /* Centralizando textos de descrição (cite: image_0.png) */
        p { color: var(--gray); font-size: 1em; line-height: 1.6; max-width: 600px; margin: 0 auto 15px auto; }

        /* --- Galeria de Cards com Thumbnail (cite: image_1.png) --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-top: 40px;
        }

        /* Efeito de Link Inteiro no Card */
        .game-link { text-decoration: none; color: inherit; display: block; transition: 0.3s; }
        .game-link:hover { transform: translateY(-8px); }

        .game-card {
            background: var(--card); border-radius: 12px;
            border: 1px solid #30363d; overflow: hidden;
            display: flex; flex-direction: column; height: 100%;
        }

        /* Ajuste do Efeito de Destaque Neon (cite: image_8.png) */
        .game-link:hover .game-card {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* Tamanho e Fallback das Thumbs (cite: image_11.png) */
        .game-card img {
            width: 100%; height: 180px; object-fit: cover;
            border-bottom: 1px solid #30363d; background: #000;
        }
