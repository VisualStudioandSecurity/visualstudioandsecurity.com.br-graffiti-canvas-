<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Guilherme Silva</title>
    
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; --neon: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: white;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            text-align: center; min-height: 100vh;
        }

        .container { width: 92%; max-width: 1000px; margin: 30px auto; }

        h1 {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon); color: white;
            margin-bottom: 5px;
        }

        .section-title { 
            color: var(--neon); font-size: 1.1rem; margin: 40px 0 20px; 
            text-transform: uppercase; border-bottom: 1px solid #30363d; 
            display: inline-block; padding-bottom: 5px; 
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; width: 100%; margin-top: 20px;
        }

        .game-link { text-decoration: none; color: inherit; display: block; }
        
        .game-card {
            background: var(--card); border-radius: 12px; border: 1px solid #30363d;
            overflow: hidden; transition: 0.3s; text-align: left;
        }

        .game-link:hover .game-card { transform: translateY(-5px); border-color: var(--neon); }

        .game-card img { width: 100%; height: 160px; object-fit: cover; background: #000; }

        .card-content { padding: 15px; }
        .card-content h3 { margin: 5px 0; color: var(--neon); font-size: 1.1rem; }
        .card-content p { color: var(--gray); font-size: 0.85rem; }

        .btn-group { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        .btn {
            padding: 12px 20px; border-radius: 6px; font-weight: bold;
            text-decoration: none; color: white; border: none; cursor: pointer;
        }
