<!DOCTYPE html>
<html>
<head>
    <title>Neon Snaker - VS Games</title>
    <style>
        body { background: #000; text-align: center; color: #0f0; font-family: monospace; }
        canvas { border: 5px solid #0f0; box-shadow: 0 0 20px #0f0; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>NEON SNAKER</h1>
    <canvas id="snake" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById("snake"), ctx = canvas.getContext("2d");
        let snake = [{x: 200, y: 200}], dir = {x: 20, y: 0}, food = {x: 100, y: 100};
        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = "#0f0";
            snake.forEach(p => ctx.fillRect(p.x, p.y, 18, 18));
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, 18, 18);
            let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) food = {x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20};
            else snake.pop();
            if(head.x<0 || head.x>380 || head.y<0 || head.y>380) location.reload();
        }
        setInterval(draw, 100);
        window.onkeydown = (e) => {
            if(e.key === "ArrowUp" && dir.y === 0) dir = {x:0, y:-20};
            if(e.key === "ArrowDown" && dir.y === 0) dir = {x:0, y:20};
            if(e.key === "ArrowLeft" && dir.x === 0) dir = {x:-20, y:0};
            if(e.key === "ArrowRight" && dir.x === 0) dir = {x:20, y:0};
        };
    </script>
</body>
</html>neon-snaker/index.htm
