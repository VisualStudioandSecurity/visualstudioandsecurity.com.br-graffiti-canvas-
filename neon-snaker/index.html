<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snaker - VS Games</title>
    <style>
        body { 
            background: #000; margin: 0; padding: 0;
            overflow: hidden; /* Trava o scroll do navegador */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; color: #0f0; font-family: monospace;
            touch-action: none; /* Impede gestos do sistema de mover a tela */
        }
        h1 { font-size: 1.2rem; margin: 5px 0; text-shadow: 0 0 10px #0f0; }
        
        /* Canvas Responsivo: Se adapta à largura do celular */
        canvas { 
            border: 3px solid #0f0; background: #000; 
            max-width: 90vw; max-height: 70vh; 
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>
    <h1>NEON SNAKER</h1>
    <canvas id="s" width="400" height="400"></canvas>
    
    <script>
        const c = document.getElementById("s"), x = c.getContext("2d");
        let sn = [{x:200, y:200}], d = {x:20, y:0}, f = {x:100, y:100}, s = 0;

        function draw() {
            x.fillStyle = "black"; x.fillRect(0,0,400,400);
            
            // Cobra
            x.fillStyle = "#0f0";
            sn.forEach(p => x.fillRect(p.x, p.y, 18, 18));
            
            // Comida
            x.fillStyle = "red";
            x.fillRect(f.x, f.y, 18, 18);

            let h = {x: sn[0].x + d.x, y: sn[0].y + d.y};

            // Colisões (Ajustado para 400x400)
            if(h.x < 0 || h.x >= 400 || h.y < 0 || h.y >= 400 || sn.some(p => p.x == h.x && p.y == h.y)) {
                return location.reload();
            }

            sn.unshift(h);
            if(h.x == f.x && h.y == f.y) {
                f = {x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20};
                s++;
            } else {
                sn.pop();
            }
        }

        setInterval(draw, 100);

        // CONTROLES SWIPE (Deslize)
        let tsX, tsY;
        document.addEventListener('touchstart', e => {
            tsX = e.touches[0].clientX;
            tsY = e.touches[0].clientY;
        }, {passive: false});

        document.addEventListener('touchmove', e => {
            e.preventDefault(); // Mata o scroll de vez
            if(!tsX || !tsY) return;
            let teX = e.touches[0].clientX, teY = e.touches[0].clientY;
            let dx = tsX - teX, dy = tsY - teY;

            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 0 && d.x == 0) d = {x:-20, y:0}; // Esquerda
                else if(dx < 0 && d.x == 0) d = {x:20, y:0}; // Direita
            } else {
                if(dy > 0 && d.y == 0) d = {x:0, y:-20}; // Cima
                else if(dy < 0 && d.y == 0) d = {x:0, y:20}; // Baixo
            }
            tsX = tsY = null;
        }, {passive: false});
    </script>
</body>
</html>
