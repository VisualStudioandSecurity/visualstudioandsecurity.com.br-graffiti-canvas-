<!DOCTYPE html>
<html>
<head>
    <title>Space Invaders - VS Games</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { border: 2px solid #58a6ff; background: #050505; margin-top: 20px; box-shadow: 0 0 20px #58a6ff; }
    </style>
</head>
<body>
    <h1>SPACE INVADERS</h1>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let x = 180;
        function draw() {
            ctx.clearRect(0,0,400,400);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(x, 370, 40, 20); // Nave
            ctx.fillStyle = '#f00';
            for(let i=0; i<5; i++) ctx.fillRect(50 + (i*60), 50, 30, 20); // Inimigos
            requestAnimationFrame(draw);
        }
        document.onkeydown = (e) => {
            if(e.key === "ArrowLeft" && x > 0) x -= 20;
            if(e.key === "ArrowRight" && x < 360) x += 20;
        };
        draw();
    </script>
</body>
</html>
