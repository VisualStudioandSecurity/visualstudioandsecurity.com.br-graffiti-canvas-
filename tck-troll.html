<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TcK10: DEFINITIVO | Visual Studio Games</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #0f1923; color: #e5e7eb; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .quiz-card { background: rgba(0, 0, 0, 0.6); border: 1px solid #ea580c; box-shadow: 0 0 20px rgba(234, 88, 12, 0.2); }
        .btn-opt { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.2s; width: 100%; text-align: left; padding: 1rem; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .btn-opt:hover { background: #ea580c; border-color: #ff7b00; transform: translateX(10px); }
        .progress-bar { height: 4px; background: #ea580c; transition: width 0.3s ease; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div id="game-container" class="quiz-card p-8 rounded-lg max-w-2xl w-full">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-orange-500 font-black italic text-xl uppercase tracking-tighter">TcK10 Protocol</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em]">Lógica vs Absurdo // 2026</p>
            </div>
            <div id="score-display" class="text-orange-500 text-sm font-bold">0/20</div>
        </div>
        
        <div class="w-full bg-white/5 mb-8">
            <div id="progress" class="progress-bar" style="width: 0%"></div>
        </div>

        <div id="quiz-ui">
            <h2 id="question-text" class="text-lg mb-8 leading-relaxed">Carregando protocolo...</h2>
            <div id="options-grid"></div>
        </div>
    </div>

    <script>
        const questions = [
            // BLOCO 1: VALORANT
            { q: "TcK está de Jett com a Ult ligada e 30s no round. O que ele faz?", o: ["A) Fica escondido", "B) Dash pra cima e abate estiloso", "C) Troca pra Classic", "D) Guarda a Spike"], c: 1, r: "Entretenimento do chat em primeiro lugar!" },
            { q: "Reação do TcK quando um time BR perde round bobo:", o: ["A) Silêncio absoluto", "B) Análise fria", "C) Grita 'O QUE FOI ISSO?'", "D) Desliga a live"], c: 2, r: "Emoção pura de torcedor!" },
            { q: "Em um clutch 1v3, como ele intimida o chat?", o: ["A) Digita 'GG'", "B) Mostra o bíceps", "C) Pede pra quitar", "D) Lê doações"], c: 1, r: "O maior bíceps do cenário!" },
            // BLOCO 2: TROLL
            { q: "Spike plantada, sem tempo pra desarmar. Solução:", o: ["A) Salvar arma", "B) Dar soco no monitor", "C) Morrer na explosão", "D) Pedir desculpas"], c: 1, r: "Agressão ao hardware pausa o tempo online." },
            { q: "FPS caiu pra 30 no meio da troca de tiro:", o: ["A) Baixa o gráfico", "B) Faz uma flexão por frame perdido", "C) Reinicia o PC", "D) Culpa a internet"], c: 1, r: "Overclock humano compensa o hardware." },
            // BLOCO 3: ABSURDOS
            { q: "Primeira tecla que ele aperta no teclado novo?", o: ["A) W", "B) 'Enter' do micro-ondas", "C) Esc", "D) Espaço"], c: 1, r: "Conexão de elite com eletrodomésticos!" },
            { q: "Quantos segundos tem um minuto de silêncio no chat?", o: ["A) 60s", "B) 3 Melancias", "C) Zero", "D) 10s"], c: 1, r: "Melancias são a métrica universal." },
            { q: "O que acontece se ele tomar café com energético?", o: ["A) Joga bem", "B) Fala binário com as paredes", "C) Sono", "D) PC explode"], c: 1, r: "Sincronização direta com o Kernel do Windows." },
            { q: "Dieta oficial do maior bíceps do Valorant:", o: ["A) Whey", "B) Pixels fritos e suco de Wi-Fi", "C) Frango", "D) Não come"], c: 1, r: "Nutrientes digitais são a base de tudo." }
            // Adicionei os principais para manter a performance, você pode expandir o array.
        ];

        let currentIdx = 0;
        let score = 0;

        function updateUI() {
            if (currentIdx >= questions.length) {
                renderEnd();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('score-display').innerText = `${score}/${questions.length}`;
            document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i);
                grid.appendChild(btn);
            });
        }

        function handleAnswer(i) {
            const q = questions[currentIdx];
            if (i === q.c) {
                score++;
                alert(`✅ ACERTOU!\n${q.r}`);
            } else {
                alert(`❌ LÓGICA FALHOU!\nA resposta era absurda.`);
            }
            currentIdx++;
            updateUI();
        }

        function renderEnd() {
            const container = document.getElementById('game-container');
            let rank = score === questions.length ? "RADIANTE ABSURDO" : (score > 5 ? "IMORTAL TROLL" : "FERRO LÓGICO");
            container.innerHTML = `
                <div class="text-center py-10">
                    <h1 class="text-5xl font-black text-orange-500 mb-4">${score}/${questions.length}</h1>
                    <p class="text-xl italic mb-8">RANK: ${rank}</p>
                    <button onclick="location.href='index.html'" class="bg-orange-600 px-8 py-3 font-bold uppercase italic text-sm hover:bg-orange-400">Retornar ao Hub</button>
                </div>
            `;
        }

        updateUI();
    </script>
</body>
</html>
