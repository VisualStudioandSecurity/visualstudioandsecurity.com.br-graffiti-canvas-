<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TcK10: MEGA TROLL | Visual Studio Games</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #0f1923; color: #e5e7eb; font-family: 'Orbitron', sans-serif; }
        .quiz-container { background: rgba(0, 0, 0, 0.4); border: 1px solid #f97316; }
        .btn-option { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; }
        .btn-option:hover { background: #ea580c; color: white; border-color: #ea580c; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="game-box" class="quiz-container p-8 rounded-lg max-w-2xl w-full">
        <h1 class="text-2xl font-black text-orange-500 mb-2 uppercase italic">🔥 TcK10: MEGA TROLL 🔥</h1>
        <p class="text-xs text-gray-500 mb-6 tracking-widest uppercase italic">Protocolo Bíceps // 2026</p>
        <div id="quiz-content">
            </div>
    </div>

    <script>
        const questoes = [
            { p: "Se o TcK10 comprar um teclado novo, qual a primeira tecla que ele aperta?", o: ["A) W (para andar)", "B) A tecla 'Enter' do micro-ondas", "C) Esc (para sair)", "D) Espaço"], c: 1, r: "Conexão com eletrodomésticos zera o lag!" },
            { p: "Quantos segundos tem um minuto de silêncio no chat do TcK?", o: ["A) 60 segundos", "B) 3 Melancias", "C) Zero, o chat nunca para", "D) 10 segundos"], c: 1, r: "Frutas são a unidade de medida padrão no chat." },
            { p: "Qual a dieta oficial para manter o maior bíceps do Valorant?", o: ["A) Proteína e Whey", "B) Pixels fritos e suco de Wi-Fi", "C) Frango e batata doce", "D) Ele não come"], c: 1, r: "Nutrientes digitais para músculos virtuais." }
            // Adicione as outras perguntas seguindo este modelo
        ];

        let current = 0;
        let score = 0;

        function loadQuestion() {
            if(current >= questoes.length) {
                showResult();
                return;
            }
            const q = questoes[current];
            let html = `<p class="text-lg mb-6">${q.p}</p>`;
            q.o.forEach((opt, index) => {
                html += `<button class="btn-option" onclick="check(${index})">${opt}</button>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function check(index) {
            const q = questoes[current];
            if(index === q.c) {
                score++;
                alert("✅ ACERTOU! " + q.r);
            } else {
                alert("❌ ERROU! O absurdo era a resposta correta.");
            }
            current++;
            loadQuestion();
        }

        function showResult() {
            let rank = score === questoes.length ? "RADIANTE ABSURDO" : "FERRO LÓGICO";
            document.getElementById('quiz-content').innerHTML = `
                <div class="text-center">
                    <h2 class="text-4xl font-bold mb-4">${score}/${questoes.length}</h2>
                    <p class="text-orange-500 font-bold tracking-widest">RANK: ${rank}</p>
                    <button onclick="location.href='index.html'" class="mt-8 text-xs underline">VOLTAR AO HUB</button>
                </div>`;
        }

        loadQuestion();
    </script>
</body>
</html>
