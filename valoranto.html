    * { box-sizing: border-box; }

    .cell {
      width: 50px;
      height: 50px;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      background: #1a1a2e;
      transition: all 0.3s;
      user-select: none;

    .cell.present { background: #b59f3b; border-color: #b59f3b; }
    .cell.absent { background: #3a3a3c; border-color: #3a3a3c; }

    .key {
      height: 45px;
      min-width: 40px;
      padding: 0 8px;
      border-radius: 6px;
      background: #444;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Orbitron', monospace;
      border: 1px solid #666;
    }

    .key:hover { background: #666; transform: scale(1.05); }
    .key:active { transform: scale(0.95); }
    .key.wide { min-width: 60px; }
    .key.correct { background: #538d4e; border-color: #538d4e; }
    .key.present { background: #b59f3b; border-color: #b59f3b; }
    .key.absent { background: #2a2a2c; border-color: #2a2a2c; color: #666; }

    .shake { animation: shake 0.5s ease; }

  <script>
    // 🔒 ANTI-CÓPIA - Bloqueador de DevTools e Cópia
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('selectstart', (e) => e.preventDefault());
    document.addEventListener('dragstart', (e) => e.preventDefault());
    document.addEventListener('copy', (e) => e.preventDefault());
    document.addEventListener('cut', (e) => e.preventDefault());

    document.addEventListener('keydown', (e) => {
      if (e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
          (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'a'))) {
        e.preventDefault();
        showProtectionAlert();
      }
    });

    function showProtectionAlert() {
      const existing = document.getElementById('protection-alert');
      if (existing) return;

      const alert = document.createElement('div');
      alert.id = 'protection-alert';
      alert.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a2e;
        border: 3px solid #ff4655;
        padding: 30px 40px;
        border-radius: 12px;
        z-index: 9999;
        text-align: center;
        font-family: 'Orbitron', monospace;
        box-shadow: 0 0 30px rgba(255, 70, 85, 0.5);
        animation: slideUp 0.4s ease;
      `;
      alert.innerHTML = `
        <div style="font-size: 2rem; margin-bottom: 15px;">⚠️</div>
        <div style="font-size: 1.2rem; color: #ff4655; font-weight: bold; margin-bottom: 10px;">Inspeção não permitida!</div>
        <div style="font-size: 0.9rem; color: #ccc;">Este jogo está protegido contra cópia.</div>
      `;

      document.body.appendChild(alert);

      setTimeout(() => {
        alert.style.opacity = '0';
        alert.style.transition = 'opacity 0.3s ease';
        setTimeout(() => alert.remove(), 300);
      }, 2000);
    }

        row.className = 'flex gap-2';

        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${r}-${c}`;

          }

          row.appendChild(cell);
        }
        board.appendChild(row);
      }
    }

    function renderKeyboard() {
      const keyboard = document.getElementById('keyboard');
      keyboard.innerHTML = '';

      const rows = [
        'QWERTYUIOP'.split(''),
        'ASDFGHJKL'.split(''),
        ['ENTER', ...('ZXCVBNM'.split('')), 'BACKSPACE']
      ];

      rows.forEach((row) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'flex gap-1 justify-center';

        row.forEach(key => {
          const btn = document.createElement('button');
          btn.className = 'key';
          if (key === 'ENTER' || key === 'BACKSPACE') btn.classList.add('wide');

          btn.textContent = key === 'BACKSPACE' ? '⌫' : key;

          if (keyStates[key]) {
            btn.classList.add(keyStates[key]);

          btn.addEventListener('click', () => handleKey(key));
          rowEl.appendChild(btn);
        });

        keyboard.appendChild(rowEl);

      for (let c = 0; c < COLS; c++) {

        if (cell) guess.push(cell.textContent);
      }
      return guess.join('') || null;
    }

    function handleKey(key) {
      if (gameOver) return;

      if (key === 'BACKSPACE') {
        if (currentCol > 0) {
          currentCol--;
          const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
          cell.textContent = '';
          cell.classList.remove('filled');
        }
      } else if (key === 'ENTER') {
        if (currentCol === COLS) {
          submitGuess();
        } else {
          showMessage('Palavra incompleta');
        }
      } else {
        if (currentCol < COLS) {
          const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
          cell.textContent = key;
          cell.classList.add('filled');
          currentCol++;

      if (!WORD_LIST.includes(guess)) {

        setTimeout(() => document.getElementById(`game-board`).classList.remove('shake'), 500);
        return;

      const feedback = [];
      const secretLetters = {};

      for (let i = 0; i < COLS; i++) {
        if (guess[i] === secretWord[i]) {
          feedback[i] = 'correct';
          keyStates[guess[i]] = 'correct';
        } else {
          secretLetters[secretWord[i]] = (secretLetters[secretWord[i]] || 0) + 1;
        }
      }

      for (let i = 0; i < COLS; i++) {
        if (feedback[i] !== 'correct') {
          if (secretLetters[guess[i]] && secretLetters[guess[i]] > 0) {
            feedback[i] = 'present';
            secretLetters[guess[i]]--;
            if (keyStates[guess[i]] !== 'correct') keyStates[guess[i]] = 'present';
          } else {
            feedback[i] = 'absent';
            if (!keyStates[guess[i]]) keyStates[guess[i]] = 'absent';
          }
        }
      }

      for (let i = 0; i < COLS; i++) {
        const cell = document.getElementById(`cell-${currentRow}-${i}`);
        cell.classList.add('flip-in');
        setTimeout(() => {
          cell.classList.add(feedback[i]);
        }, 200);
      }

      if (guess === secretWord) {
        gameWon = true;
        gameOver = true;
        setTimeout(() => showMessage('Parabéns! 🎉'), 600);
      } else if (currentRow === ROWS - 1) {
        gameOver = true;
        setTimeout(() => showMessage(`Palavra: ${secretWord}`), 600);
      } else {
        currentRow++;
        currentCol = 0;
      }

      renderKeyboard();
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
      currentRow = 0;
      currentCol = 0;
      gameOver = false;
      gameWon = false;
      hintsUsed = 0;
      secretWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
      keyStates = {};
      'QWERTYUIOPASDFGHJKLZXCVBNM'.split('').forEach(key => {
        keyStates[key] = null;

      else if (key === 'ENTER') handleKey('ENTER');
      else if (key === 'BACKSPACE') handleKey('BACKSPACE');

    function updateHintBtn() {
      const hintBtn = document.getElementById('hint-btn');
      hintBtn.textContent = `💡 ${hintsUsed}/${MAX_HINTS}`;
      hintBtn.style.opacity = hintsUsed >= MAX_HINTS ? '0.5' : '1';
    }

    function showHint() {
      if (hintsUsed >= MAX_HINTS) {
        showMessage('Sem dicas disponíveis');
        return;
      }

      if (gameOver) {
        showMessage('Jogo terminado');
        return;
      }

      hintsUsed++;

      const hintTypes = [
        () => {
          const vowels = secretWord.split('').filter(l => 'AEIOU'.includes(l));
          return `Tem ${vowels.length} vogal(s): ${vowels.join(', ')}`;
        },
        () => {
          const firstLetter = secretWord[0];
          return `Começa com: ${firstLetter}`;
        },
        () => {
          const lastLetter = secretWord[4];
          return `Termina com: ${lastLetter}`;
        }
      ];

      const hint = hintTypes[hintsUsed - 1]();
      showMessage(hint);
      updateHintBtn();
    }

    document.getElementById('hint-btn').addEventListener('click', showHint);

    updateHintBtn();
    renderBoard();
    renderKeyboard();
